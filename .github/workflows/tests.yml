name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: mbstring, xml, ctype, curl, dom, tokenizer, pdo, pdo_sqlite, redis, zip, bcmath, fileinfo, intl

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          REDIS_CLIENT: predis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          PROFILE_PROVIDER: fake
          WEBHOOK_SECRET: test-webhook-secret
        run: |
          set -o pipefail
          php artisan test --colors=never 2>&1 | tee pest-output.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::Test output"
            cat pest-output.txt
            echo "::endgroup::"
            tail -n 40 pest-output.txt | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit "$status"
          fi
