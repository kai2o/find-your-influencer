name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: mbstring, xml, ctype, curl, dom, tokenizer, pdo, pdo_sqlite, zip, bcmath, fileinfo, intl

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Prepare environment
        id: prep
        run: |
          cp .env.example .env
          KEY="$(php artisan key:generate --show --no-ansi | tr -d '\r')"
          # Write a dedicated testing env so Laravel has APP_KEY under APP_ENV=testing
          cp .env .env.testing
          echo "APP_KEY=$KEY" >> .env
          echo "APP_KEY=$KEY" >> .env.testing
          echo "app_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Tests
        env:
          APP_KEY: ${{ steps.prep.outputs.app_key }}
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          REDIS_CLIENT: predis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          PROFILE_PROVIDER: fake
          WEBHOOK_SECRET: test-webhook-secret
        run: |
          set +e
          ./vendor/bin/pest --colors=never > pest-output.txt 2>&1
          status=$?
          echo "::group::Test output"
          cat pest-output.txt
          echo "::endgroup::"
          if [ "$status" -ne 0 ]; then
            tail -n 50 pest-output.txt | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
          exit "$status"
